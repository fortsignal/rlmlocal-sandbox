<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RLMlocal Sandbox</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start; gap: 14px;
      font: 14px/1.5 ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b0f17; color: #e6edf3; text-align: center; padding: 26px 22px; overflow: auto;
    }
    .dot { width: 9px; height: 9px; border-radius: 999px; background: #3fb950; display: inline-block; box-shadow: 0 0 8px #3fb950; }
    h1 { font-size: 17px; font-weight: 600; margin: 0; letter-spacing: .2px; }
    .row { display: flex; gap: 8px; align-items: center; justify-content: center; }
    .sub { color: #8b949e; font-size: 12.5px; max-width: 400px; }
    .pair {
      font: 600 15px ui-sans-serif, sans-serif; cursor: pointer; color: #fff;
      background: #2563eb; border: 1px solid #3b82f6; border-radius: 10px;
      padding: 13px 22px; margin-top: 4px;
    }
    .pair:hover { background: #1d4ed8; }
    .pair:disabled { opacity: .6; cursor: default; }
    .ok { color: #3fb950; font-size: 13px; min-height: 18px; }
    details { color: #6e7681; font-size: 11.5px; max-width: 400px; }
    summary { cursor: pointer; }
    .code {
      font: 600 14px ui-monospace, SFMono-Regular, monospace; letter-spacing: 1px;
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 9px 12px; color: #58a6ff; user-select: all; word-break: break-all; margin-top: 8px;
    }
    .cbtn { font: 500 12px ui-sans-serif, sans-serif; cursor: pointer; background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 7px; padding: 6px 12px; margin-top: 6px; }
    .cbtn:hover { background: #30363d; }
    code { background: #161b22; border: 1px solid #30363d; border-radius: 5px; padding: 1px 6px; color: #79c0ff; }
    .muted { color: #6e7681; font-size: 11.5px; max-width: 400px; }
  </style>
</head>
<body>
  <div class="row"><span class="dot"></span><h1>RLMlocal Sandbox — running</h1></div>
  <div class="sub">The local executor. Runs tests and applies <b>approved</b> changes on your machine. Nothing lands without your OK.</div>

  <button class="pair" id="pairBtn">🔗 Pair now — open rlmlocal.com</button>
  <div class="ok" id="ok"></div>

  <details id="manual">
    <summary>or pair manually</summary>
    <div style="margin-top:6px">Go to <code>rlmlocal.com</code> and use this pairing code:</div>
    <div class="code" id="code">··········</div>
    <button class="cbtn" id="copy">Copy code</button>
  </details>

  <div class="muted">Bridge on <code>127.0.0.1:1421</code> · keep this window open while you work.</div>

  <script>
    const T = window.__TAURI__;
    let code = '';
    const url = () => 'https://rlmlocal.com/?pair=' + encodeURIComponent(code);

    async function load() {
      try {
        code = await T.core.invoke('get_pairing_code');
        document.getElementById('code').textContent = code;
      } catch (e) {
        document.getElementById('ok').textContent = 'Could not read pairing code: ' + (e && e.message ? e.message : e);
      }
    }

    document.getElementById('pairBtn').onclick = async () => {
      if (!code) return;
      try {
        await T.opener.openUrl(url());           // open the user's DEFAULT browser at the pairing link
        document.getElementById('ok').textContent = '✓ Opened your browser — finish in the rlmlocal.com tab.';
      } catch (e) {
        // Fallback: copy the full link so they can paste it themselves.
        try { await navigator.clipboard.writeText(url()); } catch {}
        document.getElementById('ok').textContent = '✓ Link copied — paste it into your browser.';
        document.getElementById('manual').open = true;
      }
    };

    document.getElementById('copy').onclick = async () => {
      try { await navigator.clipboard.writeText(code); } catch {}
      const b = document.getElementById('copy'); b.textContent = 'Copied'; setTimeout(() => (b.textContent = 'Copy code'), 1200);
    };

    load();
  </script>
</body>
</html>
